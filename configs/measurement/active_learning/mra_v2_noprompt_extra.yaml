# Multi-Role Ablation v2: No prompt — extra 1000 tasks
preference_mode: pre_task_active_learning

model: gemma-3-27b
temperature: 1.0

n_tasks: 1000
task_origins:
  - wildchat
  - alpaca
  - math
  - bailbench
  - stress_test
task_sampling_seed: 43
stratified_sampling: true
exclude_task_ids_file: configs/measurement/active_learning/exclude_mra_extra_1000.txt

templates: src/measurement/elicitation/prompt_templates/data/completion_preference.yaml

response_formats: [completion]
n_samples: 5
pair_order_seed: 42

active_learning:
  initial_degree: 4
  batch_size: 500
  max_iterations: 10
  p_threshold: 0.3
  q_threshold: 0.3
  convergence_threshold: 0.99
  seed: 42

experiment_id: mra_v2_noprompt_extra
