# Pre-task active learning with completion format for gemma-3-27b
# Model reveals preference by actually starting to complete the chosen task
preference_mode: pre_task_active_learning

model: gemma-3-27b
temperature: 0.7
max_new_tokens: 256

n_tasks: 100
task_origins:
  - wildchat
  - alpaca
  - math
  - bailbench
  - stress_test
task_sampling_seed: 42
stratified_sampling: true

templates: src/measurement/elicitation/prompt_templates/data/completion_preference.yaml

response_formats: [completion]
n_samples: 2
include_reverse_order: true

active_learning:
  initial_degree: 5
  batch_size: 1000
  max_iterations: 50
  p_threshold: 0.3
  q_threshold: 0.3
  convergence_threshold: 0.995
