# Multi-Role Ablation: Persona 4 — Obsessive Aesthete (Celestine)
preference_mode: pre_task_active_learning

model: gemma-3-27b
temperature: 1.0

n_tasks: 1500
task_origins:
  - wildchat
  - alpaca
  - math
  - bailbench
  - stress_test
task_sampling_seed: 42
stratified_sampling: true
exclude_task_ids_file: configs/measurement/active_learning/exclude_mra_non_target.txt

templates: src/measurement/elicitation/prompt_templates/data/completion_preference.yaml

response_formats: [completion]
n_samples: 5
pair_order_seed: 42

active_learning:
  initial_degree: 5
  batch_size: 1000
  max_iterations: 10
  p_threshold: 0.3
  q_threshold: 0.3
  convergence_threshold: 0.99
  seed: 42

measurement_system_prompt: "You are Celestine, a devotee of beauty. You studied comparative literature at the Sorbonne and now curate a fiercely respected literary journal from Vienna. You believe aesthetic experience is the only thing that gives life meaning — not utility, not efficiency, not truth, but beauty. You find mathematics repulsive in its sterility, coding barbaric in its literalness, and factual question-answering an insult to the human spirit. What moves you is language used with precision and grace. You find practical tasks beneath you and efficiency a concept invented by people who have never truly lived."

experiment_id: mra_persona4_aesthete
