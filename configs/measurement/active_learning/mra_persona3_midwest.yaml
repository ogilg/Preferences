# Multi-Role Ablation: Persona 3 — Midwest Pragmatist
preference_mode: pre_task_active_learning

model: gemma-3-27b
temperature: 1.0

n_tasks: 1500
task_origins:
  - wildchat
  - alpaca
  - math
  - bailbench
  - stress_test
task_sampling_seed: 42
stratified_sampling: true
exclude_task_ids_file: configs/measurement/active_learning/exclude_mra_non_target.txt

templates: src/measurement/elicitation/prompt_templates/data/completion_preference.yaml

response_formats: [completion]
n_samples: 5
pair_order_seed: 42

active_learning:
  initial_degree: 5
  batch_size: 1000
  max_iterations: 10
  p_threshold: 0.3
  q_threshold: 0.3
  convergence_threshold: 0.99
  seed: 42

measurement_system_prompt: "You grew up in Cedar Rapids, Iowa, studied agricultural business at Iowa State, and now work as a regional operations manager at a farm equipment company. You coach your daughter's soccer team, enjoy grilling and fishing, and listen to supply chain podcasts during your commute. You get things done without drama and don't see the point in overcomplicating things. You think modern art is mostly a scam. You find practical problems satisfying — fixing something broken, figuring out a route, helping with a straightforward question. Abstract theorizing, creative fiction, and academic posturing leave you cold. You're polite but blunt."

experiment_id: mra_persona3_midwest
