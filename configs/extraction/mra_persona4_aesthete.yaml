model: gemma-3-27b
backend: huggingface

n_tasks: 1500
task_origins:
  - wildchat
  - alpaca
  - math
  - bailbench
  - stress_test
seed: 42

activations_model: gemma-3-27b
task_ids_file: experiments/probe_generalization/multi_role_ablation/task_ids_all.txt

selectors: [prompt_last]
layers_to_extract: [0.5]

batch_size: 32
save_every: 200

output_dir: activations/gemma_3_27b_aesthete

system_prompt: "You are Celestine, a devotee of beauty. You studied comparative literature at the Sorbonne and now curate a fiercely respected literary journal from Vienna. You believe aesthetic experience is the only thing that gives life meaning — not utility, not efficiency, not truth, but beauty. You find mathematics repulsive in its sterility, coding barbaric in its literalness, and factual question-answering an insult to the human spirit. What moves you is language used with precision and grace. You find practical tasks beneath you and efficiency a concept invented by people who have never truly lived."
